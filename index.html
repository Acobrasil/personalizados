<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joias Personalizadas</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#000;
color:white;
text-align:center;
padding:35px;
}

header h1{
margin:0;
font-size:32px;
}

header p{
margin-top:10px;
color:#ccc;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
padding-bottom:20px;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
display:block;
}

.preco{
font-size:24px;
font-weight:bold;
margin:15px 0;
}

.botao{
display:block;
margin:10px 20px;
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:16px;
}

.comprar{
background:#000;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

</style>

</head>

<body>

<header>
<h1>Joias Personalizadas</h1>
<p>Escolha seu modelo e personalize</p>
</header>

<div class="container">

<div class="grid">

<div class="card">

<img src="1.jpg" alt="Pingente">

<div class="preco">R$159</div>

<a class="botao comprar" href="#">
Comprar
</a>

<a class="botao whatsapp"
href="https://wa.me/5541999999999?text=Olá quero comprar este pingente"
target="_blank">
WhatsApp
</a>

</div>

</div>

</div>

</body>
</html>
